[ids]
# USB HID x3
352d:2380

[global]
chord_timeout = 40

[main]
# Caps 扩展层
capslock = overload(caplayer, oneshot(shift))
# Esc 扩展层
esc = overload(esclayer, esc)
# Tab 扩展层
tab = overload(tablayer, tab)
# 字母组合键退格
d+f = backspace
# 字母组合键删除
j+k = delete

[caplayer]
# 模拟游戏方向键
a = left
s = down
d = right
w = up
# 翻页操作
compose = pagedown
slash = pageup
# 退格/删除键两用
backspace = delete
# 右功能键
minus = f11
equal = f12
# 复制
c = macro( C-c )
# 剪切
x = macro( C-x )
# 粘贴
v = macro( C-v )
# 撤销
z = macro( C-z )
# 生成引号对
apostrophe = macro( " " left )
# 生成括号对
9 = macro( ( ) left )
# 生成中括号对
[ = macro( [ ] left )

[esclayer]
# 左功能键
1 = f1
2 = f2
3 = f3

[tablayer]
# KDE 工作区切换
q = macro( C-A-left )
e = macro( C-A-right )

[alt]
# 反引号
esc = `

[shift]
# 波浪号
esc = ~

